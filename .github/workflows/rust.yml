name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        sudo apt update
        sudo apt install -y build-essential g++-aarch64-linux-gnu gcc-aarch64-linux-gnu just
        cargo fmt --all --check
        cargo clippy --all
        cargo test
        SONIC_QEMU_JOBS=16 just qemu
