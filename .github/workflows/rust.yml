name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        sudo apt update
        sudo apt install -y build-essential g++-aarch64-linux-gnu gcc-aarch64-linux-gnu just libglib2.0-dev
        cargo fmt --all --check
        cargo clippy --all
        cargo test
        rustup target add aarch64-unknown-linux-musl

        just qemu-prepare

        sudo dpkg --add-architecture arm64
        sudo apt update
        sudo apt install -y musl:arm64 musl-dev:arm64 libgcc-s1:arm64

        mkdir -p "$PWD/target/aarch64-musl-dynamic"

        LIBC_SO="$(dpkg -L musl:arm64 musl-dev:arm64 | grep -E '/libc\.so$' | head -n1)"
        LIBGCC_SO="$(dpkg -L libgcc-s1:arm64 | grep -E '/libgcc_s\.so\.1$' | head -n1)"

        ln -sf "$LIBC_SO" "$PWD/target/aarch64-musl-dynamic/libc.so"
        ln -sf "$LIBGCC_SO" "$PWD/target/aarch64-musl-dynamic/libgcc_s.so"
        ln -sf "$LIBGCC_SO" "$PWD/target/aarch64-musl-dynamic/libgcc_s.so.1"

        export SONIC_QEMU_MUSL_DYNAMIC_LIB_DIR="$PWD/target/aarch64-musl-dynamic"

        SONIC_QEMU_JOBS=4 just qemu
