[[case]]
name = "cortex-a53"
arch = "aarch64"
qemu = "qemu-aarch64"
cpu = "cortex-a53"
variants = ["generic", "cortex-a53", "neoverse-n1"]
expect_selected_any_of = ["generic", "cortex-a53"]
expect_present = ["neon"]
expect_absent = ["sve", "sve2"]

[[case]]
name = "neoverse-n1"
arch = "aarch64"
qemu = "qemu-aarch64"
cpu = "neoverse-n1"
variants = ["generic", "neoverse-n1", "neoverse-v1", "neoverse-n2"]
expect_selected = "neoverse-n1"
expect_present = ["neon", "crc", "lse", "dotprod"]
expect_absent = ["sve2"]

[[case]]
name = "neoverse-v1"
arch = "aarch64"
qemu = "qemu-aarch64"
cpu = "neoverse-v1"
variants = ["generic", "neoverse-n1", "neoverse-v1", "neoverse-n2"]
expect_selected = "neoverse-v1"
expect_present = ["neon", "sve"]
